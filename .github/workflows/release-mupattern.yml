name: Release mupattern (Windows x86_64)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build mupattern
        run: cargo build -p mupattern-rs --release

      - name: Rename to mupattern-windows-x86_64.exe
        run: |
          Copy-Item target\release\mupattern.exe mupattern-windows-x86_64.exe

      - name: Upload mupattern CLI
        uses: actions/upload-artifact@v4
        with:
          name: mupattern-windows-x86_64
          path: mupattern-windows-x86_64.exe

  build-electron:
    needs: build-cli
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore mupattern binary
        uses: actions/download-artifact@v4
        with:
          name: mupattern-windows-x86_64
          path: artifact

      - name: Place mupattern in target
        run: |
          New-Item -ItemType Directory -Force -Path target\release
          Copy-Item artifact\mupattern-windows-x86_64.exe target\release\mupattern.exe

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build and package desktop app
        run: bun run build:desktop

      - name: Upload Electron installer
        uses: actions/upload-artifact@v4
        with:
          name: mupattern-desktop-windows
          path: release/mupattern-desktop-windows-x86_64.exe

  release:
    needs: [build-cli, build-electron]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download mupattern CLI
        uses: actions/download-artifact@v4
        with:
          name: mupattern-windows-x86_64
          path: cli

      - name: Download Electron installer
        uses: actions/download-artifact@v4
        with:
          name: mupattern-desktop-windows
          path: desktop

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/mupattern-windows-x86_64.exe
            desktop/mupattern-desktop-windows-x86_64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
